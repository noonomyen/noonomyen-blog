name: Build and Check

on:
  push:
    branches: [ main ] # Adjust branches as needed
  pull_request:
    branches: [ main ] # Adjust branches as needed

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    name: Astro Check
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Astro Check
        run: bun run check

  build:
    runs-on: ubuntu-latest
    name: Astro Build and Test
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Cache Astro
        uses: actions/cache@v4
        with:
          path: node_modules/.astro
          key: ${{ runner.os }}-astro-${{ hashFiles('bun.lock') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-astro-${{ hashFiles('bun.lock') }}-
            ${{ runner.os }}-astro-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Astro Build
        run: bun run build:dev

      - name: Run Backward Compatibility Tests
        run: bun test test/compatibility.test.ts

      - name: Run Core Web Route Tests
        run: bun test test/web.test.ts

      - name: Run Content Integrity Tests
        run: bun test test/content.test.ts

      # Temporarily disabled: Backend API tests are intermittently hanging in CI for unknown reasons.
      # - name: Run Backend API Tests
      #   run: bun test test/api.test.ts
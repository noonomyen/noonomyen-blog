name: Deploy to OCIR

on:
  push:
    branches:
      - deploy

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to OCIR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.DEPLOY_OCIR_SERVER }}
          username: ${{ secrets.DEPLOY_OCIR_USER }}
          password: ${{ secrets.DEPLOY_OCIR_PASS }}

      - name: Build and Push Docker image
        run: |
          IMAGE_NAME="${{ secrets.DEPLOY_OCIR_SERVER }}/${{ secrets.DEPLOY_OCIR_IMAGE }}:${{ github.sha }}"
          docker build -t "$IMAGE_NAME" .
          docker push "$IMAGE_NAME"

      - name: Trigger Deployment Webhook
        run: |
          curl -X POST "${{ secrets.DEPLOY_SERVER }}${{ github.sha }}" \
               -H "Authorization: ${{ secrets.DEPLOY_TOKEN }}"

name: Deploy

on:
  push:
    branches:
      - deploy

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    name: Build and Push Docker Image to OCIR
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to OCIR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.DEPLOY_OCIR_SERVER }}
          username: ${{ secrets.DEPLOY_OCIR_USER }}
          password: ${{ secrets.DEPLOY_OCIR_PASS }}

      - name: Build and Push Docker image
        run: |
          IMAGE_BASE="${{ secrets.DEPLOY_OCIR_SERVER }}/${{ secrets.DEPLOY_OCIR_IMAGE }}"
          docker build -t "$IMAGE_BASE:${{ github.sha }}" -t "$IMAGE_BASE:latest" .
          docker push "$IMAGE_BASE:${{ github.sha }}"
          docker push "$IMAGE_BASE:latest"

      - name: Trigger Deployment Webhook
        run: |
          curl -X POST "${{ secrets.DEPLOY_SERVER }}" \
               -H "Authorization: Bearer ${{ secrets.DEPLOY_TOKEN }}"
